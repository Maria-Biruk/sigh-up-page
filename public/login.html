<!doctype html>
<html>
  <head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="card-header">
        <h1>Login</h1>
      </div>

      <!-- Form -->
      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap">
          <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/>
          </svg>
          <input id="email" type="email" placeholder="m@example.com" autocomplete="off" />
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
          </svg>
          <input id="password" type="password" placeholder="••••••••" autocomplete="new-password" />
          <svg class="toggle-eye" onclick="showPassword()" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
          </svg>
        </div>
      </div>

      <div class="forgot-row">
        <a href="forgot.html">Forgot password?</a>
      </div>

      <button class="btn-primary" onclick="login()">Log In</button>

      <h3 id="msg"></h3>

      <div class="card-footer">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </div>
    </div>

    <script>
      // Clear inputs on page load
      function clearForm() {
        document.getElementById("email").value = "";
        document.getElementById("password").value = "";
        document.getElementById("msg").innerText = "";
      }
      window.addEventListener("pageshow", clearForm);
      window.addEventListener("DOMContentLoaded", function () {
        clearForm();
        setTimeout(clearForm, 100);
      });

      async function login() {
        const userData = {
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
        };

        const response = await fetch("http://localhost:5000/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(userData),
        });

        const result = await response.json();
        const msgEl = document.getElementById("msg");

        if (result.message) {
          sessionStorage.setItem("username", result.name);
          window.location.href = "landing.html";
        } else {
          msgEl.innerText = result.error;
        }
      }

      function showPassword() {
        const password = document.getElementById("password");
        if (password.type === "password") {
          password.type = "text";
        } else {
          password.type = "password";
        }
      }
    </script>
  </body>
</html>
